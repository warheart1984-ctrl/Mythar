name: Portability

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mythar-core-conformance:
    name: Mythar Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
        working-directory: mythar-v0.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Mythar Core v0.2 conformance
        run: PYTHONPATH=./src python -m mythar test
      - name: Run Mythar Core v0.3 conformance
        run: MYTHAR_CONFORMANCE_ROOT=../mythar-registry/tests/v0.3 PYTHONPATH=./src python -m mythar test
